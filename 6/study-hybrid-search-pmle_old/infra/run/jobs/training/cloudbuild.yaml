# Cloud Build config for the reranker trainer image (Vertex AI Custom Job).

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/run/jobs/training/Dockerfile
      - --tag=${_URI}
      - .
images:
  - ${_URI}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _URI: ""
