# Cloud Run の `--no-allow-unauthenticated` + IAM 相当を、GKE 側では IAP で
# 実現する。BackendConfig は GKE Gateway 経由でも有効 (GKE Ingress-for-Anthos
# 系の拡張)。IAP の有効化と allowlist (`sa-scheduler` など) は env overlay で。
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: search-api
  namespace: search
spec:
  iap:
    enabled: true
    oauthclientCredentials:
      secretName: iap-oauth-credentials
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 60
---
# Service に BackendConfig を紐付けるためのアノテーションは
# service.yaml 側で cloud.google.com/backend-config annotation を追加する
# overlay で対応。ここでは BackendConfig の定義のみ。
