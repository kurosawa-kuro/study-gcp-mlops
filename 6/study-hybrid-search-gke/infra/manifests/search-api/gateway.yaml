# Gateway API (v1) — GKE Gateway controller (`gke-l7-global-external-managed`)
# が managed HTTPS LB を作る。証明書は Google-managed を前提。
# hostname / TLS は環境 (`environments/<env>/`) 側で Kustomize overlay する。
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: search-api-gateway
  namespace: search
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "search-api.example.com" # overlay で置換
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: search-api-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: search-api
  namespace: search
spec:
  parentRefs:
    - name: search-api-gateway
  hostnames:
    - "search-api.example.com" # overlay で置換
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: search-api
          port: 80
