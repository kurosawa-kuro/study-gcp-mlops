apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: search
  labels:
    app.kubernetes.io/name: search-api
    app.kubernetes.io/part-of: hybrid-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: search-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: search-api
    spec:
      # KSA は terraform module/kserve が作成 (Workload Identity 注釈付き)
      serviceAccountName: search-api
      containers:
        - name: search-api
          # CI / scripts/local/deploy/api_gke.py が Artifact Registry イメージへ差し替える
          image: gcr.io/cloudrun/hello
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: search-api-config
                  key: project_id
            - name: GCS_MODELS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: search-api-config
                  key: models_bucket
            - name: MEILI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: search-api-config
                  key: meili_base_url
            - name: RANKING_LOG_TOPIC
              value: "ranking-log"
            - name: FEEDBACK_TOPIC
              value: "search-feedback"
            - name: RETRAIN_TOPIC
              value: "retrain-trigger"
            - name: SEARCH_CACHE_TTL_SECONDS
              value: "120"
            - name: ENABLE_SEARCH
              value: "true"
            - name: ENABLE_RERANK
              value: "true"
            # KServe InferenceService の cluster-local エンドポイント
            - name: KSERVE_ENCODER_URL
              value: "http://property-encoder.kserve-inference.svc.cluster.local/v1/models/property-encoder:predict"
            - name: KSERVE_RERANKER_URL
              value: "http://property-reranker.kserve-inference.svc.cluster.local/v1/models/property-reranker:predict"
            - name: KSERVE_PREDICT_TIMEOUT_SECONDS
              value: "30.0"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
