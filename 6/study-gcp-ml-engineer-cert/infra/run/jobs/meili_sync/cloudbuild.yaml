# Build + push the meili-sync image for the ad-hoc Cloud Run Job.
# Usage:
#   gcloud builds submit --project=mlops-dev-a \
#     --config=infra/run/jobs/meili_sync/cloudbuild.yaml \
#     --substitutions=_URI=asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops/meili-sync:latest \
#     .

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/run/jobs/meili_sync/Dockerfile
      - --tag=${_URI}
      - .

images:
  - ${_URI}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _URI: ""
