# One-off Cloud Build job to sync BigQuery properties_cleaned → Meilisearch.
# Runs as sa-api so `id_token.fetch_id_token` on the Meili URL succeeds using
# the container's metadata server (no local impersonation required).
#
# Usage:
#   gcloud builds submit --project=mlops-dev-a \
#     --config=infra/run/services/meili_sync/cloudbuild.yaml \
#     --service-account=projects/mlops-dev-a/serviceAccounts/sa-api@mlops-dev-a.iam.gserviceaccount.com \
#     --substitutions=_MEILI_URL=<meili-search-cloud-run-url> \
#     .

steps:
  - name: python:3.12-slim
    entrypoint: bash
    args:
      - -ec
      - |
        pip install --quiet google-cloud-bigquery google-auth httpx
        python scripts/local/ops/sync_meili.py \
          --meili-base-url "${_MEILI_URL}" \
          --require-identity-token

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _MEILI_URL: ""
