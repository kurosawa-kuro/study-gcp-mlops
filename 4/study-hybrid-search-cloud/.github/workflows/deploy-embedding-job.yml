name: Deploy Embedding Job

# Phase 7 — deploy the `embedding-job` Cloud Run Job (property text → 768d
# multilingual-e5 vectors → feature_mart.property_embeddings).
#
# Path filter fires on `ml/data/**` (workspace-local) + `common/embeddings/**`
# (query-side ME5 encoder is shared with search-api so changes there must
# trigger both API + embedding-job deploys).
#
# The Cloud Run Job `embedding-job` resource is declared in infra/modules/
# runtime once Phase 9 lands; until then this workflow only rebuilds the image
# so the last pushed tag is always current. Missing Job resource → gcloud
# update fails with NOT_FOUND, which we tolerate with `|| true` so CI does not
# red-light the repo before the infra PR merges.

on:
  push:
    branches: [main]
    paths:
      - ml/data/**
      - common/src/common/embeddings/**
      - common/src/common/ports/embedding_store.py
      - common/src/common/adapters/bigquery_embedding_store.py
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-embedding-job.yml
      - .github/actions/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  PROJECT_ID: mlops-dev-a
  REPO: mlops
  JOB: embedding-job

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gcp
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          configure_docker: "true"

      - uses: ./.github/actions/build-and-push
        id: build
        with:
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          repo: ${{ env.REPO }}
          image: ${{ env.JOB }}
          dockerfile: infra/run/jobs/embedding/Dockerfile

      - name: Update Cloud Run Jobs
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          # Points the Job at the bundled `embed` console script (ml/data/pyproject.toml).
          STATIC="PROJECT_ID=${{ env.PROJECT_ID }}|GIT_SHA=${SHORT_SHA}|ENCODER_MODEL_DIR="
          ENV_ARG="^|^${STATIC}"
          # embedding-job は infra/modules/runtime/main.tf で定義済
          # (google_cloud_run_v2_job.embedding_job)。以前の NOT_FOUND 許容は
          # 不要になったので `|| true` を除去し、失敗で workflow を落とす。
          gcloud run jobs update ${{ env.JOB }} \
            --region ${{ env.REGION }} \
            --image "${{ steps.build.outputs.image_uri }}" \
            --command "embed" \
            --service-account sa-job-embed@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "${ENV_ARG}"
