name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - app/**
      - common/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-api.yml
      - .github/actions/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  PROJECT_ID: mlops-dev-a
  REPO: mlops
  SERVICE: search-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gcp
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          configure_docker: "true"

      - uses: ./.github/actions/build-and-push
        id: build
        with:
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          repo: ${{ env.REPO }}
          image: ${{ env.SERVICE }}
          dockerfile: infra/run/services/search_api/Dockerfile

      - name: Deploy to Cloud Run
        run: |
          MEILI_BASE_URL=$(gcloud run services describe meili-search \
            --region "${{ env.REGION }}" \
            --format 'value(status.url)')
          STATIC_ENV="PROJECT_ID=${{ env.PROJECT_ID }}|GCS_MODELS_BUCKET=mlops-dev-a-models|RANKING_LOG_TOPIC=ranking-log|FEEDBACK_TOPIC=search-feedback|RETRAIN_TOPIC=retrain-trigger|ENABLE_SEARCH=true|ENABLE_RERANK=true|ENCODER_MODEL_DIR=intfloat/multilingual-e5-base|MEILI_BASE_URL=${MEILI_BASE_URL}|MEILI_REQUIRE_IDENTITY_TOKEN=true|LOG_AS_JSON=1|GCP_LOGGING_ENABLED=1"
          # gcloud `^|^` prefix lets us use `|` as the delimiter between KEY=value
          # pairs, which keeps values containing `,` intact.
          ENV_ARG="^|^${STATIC_ENV}"
          gcloud run deploy ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --image "${{ steps.build.outputs.image_uri }}" \
            --service-account sa-api@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --cpu 2 --memory 4Gi \
            --concurrency 80 \
            --min-instances 1 --max-instances 10 \
            --cpu-boost \
            --execution-environment gen2 \
            --allow-unauthenticated \
            --set-env-vars "${ENV_ARG}" \
            --set-secrets=MEILI_MASTER_KEY=meili-master-key:latest \
            --labels "git-sha=${GITHUB_SHA::8}"
