name: Deploy Training Job

on:
  push:
    branches: [main]
    paths:
      - ml/training/**
      - common/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-training-job.yml
      - .github/actions/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  PROJECT_ID: mlops-dev-a
  REPO: mlops
  JOB: training-job

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gcp
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          configure_docker: "true"

      - uses: ./.github/actions/build-and-push
        id: build
        with:
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          repo: ${{ env.REPO }}
          image: ${{ env.JOB }}
          dockerfile: infra/run/jobs/training/Dockerfile

      - name: Update Cloud Run Jobs
        run: |
          # Truncate sha to 8 chars (runner-side, so env expansion is safe).
          SHORT_SHA="${GITHUB_SHA::8}"
          STATIC="PROJECT_ID=${{ env.PROJECT_ID }}|GIT_SHA=${SHORT_SHA}"
          ENV_ARG="^|^${STATIC}"
          gcloud run jobs update ${{ env.JOB }} \
            --region ${{ env.REGION }} \
            --image "${{ steps.build.outputs.image_uri }}" \
            --service-account sa-job-train@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "${ENV_ARG}" \
            --set-secrets=MEILI_MASTER_KEY=meili-master-key:latest
