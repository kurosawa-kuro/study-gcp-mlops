# Cloud Build config for the search-api image.
# Invoke with:
#   gcloud builds submit --config=infra/run/services/search_api/cloudbuild.yaml \
#     --substitutions=_URI=<ar-uri> .

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/run/services/search_api/Dockerfile
      - --tag=${_URI}
      - .
images:
  - ${_URI}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _URI: ""
