# Cloud Build config for the embedding-job image.
# Used by `make deploy-embedding-job-local` (Phase 9 以降) and
# `.github/workflows/deploy-embedding-job.yml`. See
# infra/run/services/search_api/cloudbuild.yaml for
# rationale.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/run/jobs/embedding/Dockerfile
      - --tag=${_URI}
      - .
images:
  - ${_URI}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _URI: ""
