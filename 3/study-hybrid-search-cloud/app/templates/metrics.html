{% extends "base.html" %}

{% block title %}Metrics · Phase3{% endblock %}

{% block content %}
<h1>Runtime Metrics</h1>
<table>
  <tbody>
    {% for key, value in metrics.items() %}
    <tr>
      <th>{{ key }}</th>
      <td><code>{{ value }}</code></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
