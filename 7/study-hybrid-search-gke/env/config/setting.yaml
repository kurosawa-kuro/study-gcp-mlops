# プロジェクト全体の非クレデンシャル設定 — ここが single source of truth。
#
# - Python から: scripts/_common.py が起動時に読み込み、DEFAULTS を構築する
# - Makefile から: トップで awk で読み出して PROJECT_ID 等の make 変数に流し込む
#
# 既存値を変えた場合の影響範囲:
#   project_id     — 全 gcloud / bq 呼び出し、Terraform var, infra/main.tf
#   region         — Cloud Run / Artifact Registry / Cloud Build / BQ ロケーション
#   api_service    — GKE Deployment 名 (`kubectl set image deployment/<name>`)
#   artifact_repo  — Artifact Registry リポジトリ ID (`<region>-docker.pkg.dev/<proj>/<repo>`)
#   このファイルは scripts/_common.py の簡易 parser 前提:
#                  top-level の flat `key: value` と block-style list のみ対応
#
# Credentials / secrets は **ここに置かない**。Secret Manager か env/secret/ に
# 個別のファイルを置き、env/secret/ 自体は .gitignore する想定。

project_id: mlops-dev-a
region: asia-northeast1
api_service: search-api
artifact_repo: mlops
vertex_location: asia-northeast1
meili_service: meili-search
meili_master_key_secret_id: meili-master-key
meili_impersonate_service_account: sa-api@mlops-dev-a.iam.gserviceaccount.com
local_api_port: 8000
local_encoder_port: 18081
local_reranker_port: 18082
local_reranker_model_path: /tmp/hybrid-search-cloud-smoke-model.txt
# Phase 7 は KServe serving であり Vertex Endpoint は deploy しない。
# Vertex Endpoint shell の display_name は `enable_vertex_endpoint_shell=true`
# の時にのみ使われ、値は `infra/terraform/environments/dev/main.tf` の
# module 呼び出しで literal 指定 (`property-{encoder,reranker}-endpoint`)。
# setting.yaml への二重宣言は値の drift を生むため置かない。
pipeline_root_bucket: mlops-dev-a-pipeline-root
pipeline_template_gcs_path: gs://mlops-dev-a-pipeline-root/templates

# Terraform var に流す識別子。GITHUB_REPO は WIF の `attribute.repository`
# 制約に焼き込まれる (タイポすると CI が auth できなくなる)。ONCALL_EMAIL は
# monitoring alert policy の通知先 — `@` を含まないと variables.tf の
# validation で落ちる。`make tf-plan` 等は env var で都度上書き可能。
github_repo: kurosawa-kuro/study-gcp-mlops-hybrid-search-cloud-v2.0
oncall_email: kurosawa-kuro@gmail.com

# sa-api を impersonate してローカルから Meilisearch / 他の Cloud Run service を
# 叩きたい開発者 user account (OIDC audience=<service URL> の identity token 発行に
# `roles/iam.serviceAccountTokenCreator` 権限が要る)。Terraform で
# `google_service_account_iam_member` を付与する。Phase 5 実運用で手動 `gcloud iam
# service-accounts add-iam-policy-binding` が漏れて 2 時間ハマった教訓。
admin_user_emails:
  - kurokawa81toshifumi@gmail.com

# Dataform — pipeline/data_job/dataform/workflow_settings.yaml は本ファイルから自動生成される
# (Makefile の `make sync-dataform-config` を実行)。Dataform の YAML スキーマは
# 固定キー (defaultProject / defaultLocation 等) なので、こちらに対応する値を
# 並べる方針。drift は tests/test_dataform_workflow_settings.py が検知する。
dataform_default_dataset: feature_mart
dataform_default_assertion_dataset: feature_mart_assertions
dataform_core_version: 3.0.0
