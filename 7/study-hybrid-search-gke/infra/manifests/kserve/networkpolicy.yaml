# KServe InferenceService への ingress は search namespace の search-api Pod
# だけに許可。クラスタ外部からの直接呼び出しは Gateway を作らないことで遮断。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kserve-inference-ingress
  namespace: kserve-inference
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: search
          podSelector:
            matchLabels:
              app.kubernetes.io/name: search-api
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 80
