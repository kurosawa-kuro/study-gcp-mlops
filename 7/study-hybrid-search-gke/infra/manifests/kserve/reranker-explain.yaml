# Vertex CPR-style LightGBM reranker server with /explain (TreeSHAP).
#
# Why a separate Pod (not via the KServe ISVC):
#   The KServe stock LightGBM runtime (`kserve/lgbserver:v0.14.0`) only
#   supports v2 predict and ignores the `parameters.explain=true` extension
#   (B19 incident). Phase 7 routes /search?explain=true to this Pod via the
#   `KSERVE_RERANKER_EXPLAIN_URL` env on search-api so the existing /predict
#   path keeps using the lgbserver ISVC while /explain comes from
#   `ml/serving/reranker.py` which knows TreeSHAP.
#
# Image: built by cloudbuild.reranker.yaml from infra/run/services/reranker.
# Update the image tag below after each build (kubectl set image).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-reranker-explain
  namespace: kserve-inference
  labels:
    app.kubernetes.io/name: property-reranker-explain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: property-reranker-explain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: property-reranker-explain
    spec:
      serviceAccountName: reranker
      containers:
        - name: reranker
          image: asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops/property-reranker:9698b2a6c2c5-1777123783
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # ml/serving/reranker.py が GCS から model.txt を pull するための env。
            # /predict と同じ artifact (production-aliased) を読むので
            # ISVC の storageUri と整合させる。
            - name: AIP_STORAGE_URI
              value: gs://mlops-dev-a-models/lgbm/v1/
            - name: AIP_HEALTH_ROUTE
              value: /health
            - name: AIP_PREDICT_ROUTE
              value: /predict
            - name: AIP_EXPLAIN_ROUTE
              value: /explain
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
              ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: property-reranker-explain
  namespace: kserve-inference
  labels:
    app.kubernetes.io/name: property-reranker-explain
spec:
  selector:
    app.kubernetes.io/name: property-reranker-explain
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
