apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: search-api
  namespace: search
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: search-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve-inference
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
    # Phase 7 Run 1 (B12 backport / Run 4 補完): GKE metadata server access for
    # Workload Identity. Without this, Pod's metadata.google.internal name
    # resolution succeeds but TCP 80 fetch is blocked → lifespan hangs at
    # google-cloud-* SDK init.
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
