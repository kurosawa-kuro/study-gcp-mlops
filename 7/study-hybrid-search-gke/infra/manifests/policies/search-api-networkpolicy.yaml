apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: search-api
  namespace: search
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: search-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve-inference
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
