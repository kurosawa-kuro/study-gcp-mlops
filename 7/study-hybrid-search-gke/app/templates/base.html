<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ハイブリッド検索 Console (Phase 7){% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
<main class="container">
  <nav>
    <ul>
      <li><strong>ハイブリッド検索 Console</strong> <small>Phase 7 · GKE + KServe</small></li>
    </ul>
    <ul>
      <li><a href="/ui/" {% if active == 'search' %}aria-current="page"{% endif %}>検索</a></li>
      <li><a href="/ui/model/metrics" {% if active == 'model-metrics' %}aria-current="page"{% endif %}>モデル精度</a></li>
      <li><a href="/ui/data" {% if active == 'data' %}aria-current="page"{% endif %}>データ</a></li>
      <li><a href="/docs" target="_blank" rel="noopener">API Docs ↗</a></li>
    </ul>
  </nav>
  {% block content %}{% endblock %}
</main>
</body>
</html>
