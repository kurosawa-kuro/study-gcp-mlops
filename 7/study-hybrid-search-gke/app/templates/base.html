<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Phase5 UI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
<main class="container">
  <nav>
    <ul><li><strong>Phase5 UI</strong></li></ul>
    <ul>
      <li><a href="/" {% if active == 'predict' %}aria-current="page"{% endif %}>Predict</a></li>
      <li><a href="/metrics" {% if active == 'metrics' %}aria-current="page"{% endif %}>Metrics</a></li>
      <li><a href="/data" {% if active == 'data' %}aria-current="page"{% endif %}>Data</a></li>
    </ul>
  </nav>
  {% block content %}{% endblock %}
</main>
</body>
</html>
