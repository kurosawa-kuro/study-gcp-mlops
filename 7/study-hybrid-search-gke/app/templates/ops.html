{% extends "base.html" %}

{% block title %}運用チェック · ハイブリッド検索 UI{% endblock %}

{% block content %}
  <section class="page-header">
    <div>
      <p class="eyebrow">Ops Check</p>
      <h1>運用チェック</h1>
      <p class="page-copy"><code>destroy-all</code> 後の高課金リソース削除漏れを確認します。</p>
    </div>
  </section>

  <article class="panel">
    <div class="action-row">
      <button id="ops-btn" type="button" onclick="loadOpsCheck()">再読込</button>
      <p id="ops-meta" class="search-state">GCP 上の残存リソースを確認します。</p>
    </div>
  </article>

  <section class="status-grid">
    <article class="status-card">
      <span class="status-label">OK</span>
      <strong id="ops-ok">-</strong>
    </article>
    <article class="status-card">
      <span class="status-label">WARN</span>
      <strong id="ops-warn">-</strong>
    </article>
    <article class="status-card status-card-danger">
      <span class="status-label">FAIL / ERROR</span>
      <strong id="ops-bad">-</strong>
    </article>
  </section>

  <section id="ops-findings" class="search-shell"></section>

<script>
  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function renderFinding(finding) {
    const items = (finding.items || []).length
      ? `<ul class="ops-item-list">${finding.items.map((item) => `<li><code>${escapeHtml(item)}</code></li>`).join("")}</ul>`
      : "";
    const note = finding.note ? `<p class="section-copy">${escapeHtml(finding.note)}</p>` : "";
    return `
      <article class="panel ops-panel ops-panel-${String(finding.severity || "ok").toLowerCase()}">
        <div class="section-heading">
          <div>
            <p class="eyebrow">${escapeHtml(finding.severity)}</p>
            <h2>${escapeHtml(finding.label)}</h2>
          </div>
        </div>
        ${note}
        ${items || `<p class="search-state">対象なし</p>`}
      </article>
    `;
  }

  async function loadOpsCheck() {
    const btn = document.getElementById("ops-btn");
    const meta = document.getElementById("ops-meta");
    const root = document.getElementById("ops-findings");
    btn.setAttribute("aria-busy", "true");
    meta.textContent = "確認中です...";
    try {
      const res = await fetch("/ops/destroy-check");
      const body = await res.json();
      if (!res.ok) {
        meta.textContent = `error: HTTP ${res.status}`;
        root.innerHTML = `<article class="panel"><pre>${escapeHtml(JSON.stringify(body, null, 2))}</pre></article>`;
        return;
      }
      document.getElementById("ops-ok").textContent = body.summary.ok;
      document.getElementById("ops-warn").textContent = body.summary.warn;
      document.getElementById("ops-bad").textContent = body.summary.fail + body.summary.error;
      meta.textContent = `${body.project_id} / ${body.region} / passed=${body.summary.passed}`;
      root.innerHTML = (body.findings || []).map(renderFinding).join("");
    } catch (err) {
      meta.textContent = `error: ${err}`;
    } finally {
      btn.removeAttribute("aria-busy");
    }
  }

  loadOpsCheck();
</script>
{% endblock %}
