<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ハイブリッド検索 UI (Phase 7){% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-brand">
      <strong>Hybrid Search</strong>
      <small>Phase 7 · GKE + KServe</small>
    </div>

    <div class="sidebar-group">
      <p class="sidebar-label">Search</p>
      <a class="sidebar-link" href="/ui/" {% if active == 'search-user' %}aria-current="page"{% endif %}>一般向け検索</a>
      <a class="sidebar-link" href="/ui/dev" {% if active == 'search-dev' %}aria-current="page"{% endif %}>開発者検索</a>
    </div>

    {% if page_mode == 'dev' %}
      <div class="sidebar-group">
        <p class="sidebar-label">Developer</p>
        <a class="sidebar-link" href="/ui/dev/model/metrics" {% if active == 'model-metrics' %}aria-current="page"{% endif %}>モデル精度</a>
        <a class="sidebar-link" href="/ui/dev/data" {% if active == 'data' %}aria-current="page"{% endif %}>学習データ</a>
        <a class="sidebar-link" href="/ui/dev/ops" {% if active == 'ops' %}aria-current="page"{% endif %}>運用チェック</a>
        <a class="sidebar-link sidebar-link-docs" href="/ui/dev/api-docs">API Docs ↗</a>
      </div>
    {% endif %}
  </aside>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
