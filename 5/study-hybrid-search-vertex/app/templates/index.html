{% extends "base.html" %}

{% block title %}Predict · Phase4{% endblock %}

{% block content %}
  <h1>Phase4 API Console</h1>
  <p>Jinja2 + PicoCSS UI for Vertex-backed hybrid search endpoints.</p>

  <section>
    <h2>Search (POST /search)</h2>
    <textarea id="search-json" rows="14">{{ search_payload | tojson(indent=2) }}</textarea>
    <button id="search-btn">Run Search</button>
  </section>

  <section>
    <h2>Feedback (POST /feedback)</h2>
    <textarea id="feedback-json" rows="8">{{ feedback_payload | tojson(indent=2) }}</textarea>
    <button id="feedback-btn">Send Feedback</button>
  </section>

  <section>
    <h2>Response</h2>
    <pre id="result">{}</pre>
  </section>
<script>
  const resultEl = document.getElementById("result");
  const show = (obj) => {
    resultEl.textContent = JSON.stringify(obj, null, 2);
  };

  async function callJson(url, payload) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const body = await res.json().catch(() => ({ error: "Invalid JSON response" }));
    show({ status: res.status, body });
  }

  document.getElementById("search-btn").addEventListener("click", async () => {
    const payload = JSON.parse(document.getElementById("search-json").value);
    await callJson("/search", payload);
  });

  document.getElementById("feedback-btn").addEventListener("click", async () => {
    const payload = JSON.parse(document.getElementById("feedback-json").value);
    await callJson("/feedback", payload);
  });
</script>
{% endblock %}
