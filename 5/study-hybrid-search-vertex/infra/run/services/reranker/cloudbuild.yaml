# Cloud Build config for the reranker CPR image (Vertex AI reranker endpoint).

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/run/services/reranker/Dockerfile
      - --tag=${_URI}
      - .
images:
  - ${_URI}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _URI: ""
